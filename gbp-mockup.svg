<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="cardShadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="mapBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ece5d3"/>
      <stop offset="100%" stop-color="#e3dcc7"/>
    </linearGradient>
  </defs>

  <!-- Map base -->
  <rect width="400" height="260" fill="url(#mapBg)"/>

  <!-- Parks / green areas -->
  <rect x="14" y="14" width="98" height="68" rx="6" fill="#c8d8b5"/>
  <rect x="284" y="158" width="102" height="84" rx="6" fill="#c8d8b5"/>
  <rect x="240" y="20" width="60" height="40" rx="4" fill="#cddcb9" opacity="0.85"/>

  <!-- Water -->
  <path d="M 0 198 Q 100 184 200 198 T 400 198 L 400 260 L 0 260 Z" fill="#a8c8dc"/>
  <path d="M 0 210 Q 100 198 200 210 T 400 210 L 400 260 L 0 260 Z" fill="#9cc0d6" opacity="0.6"/>

  <!-- Major streets -->
  <line x1="0" y1="90" x2="400" y2="90" stroke="#ffffff" stroke-width="7"/>
  <line x1="0" y1="148" x2="400" y2="148" stroke="#ffffff" stroke-width="3"/>
  <line x1="0" y1="40" x2="400" y2="40" stroke="#ffffff" stroke-width="2"/>
  <line x1="120" y1="0" x2="120" y2="260" stroke="#ffffff" stroke-width="6"/>
  <line x1="282" y1="0" x2="282" y2="260" stroke="#ffffff" stroke-width="3"/>
  <line x1="62" y1="0" x2="62" y2="260" stroke="#ffffff" stroke-width="2"/>
  <line x1="200" y1="0" x2="200" y2="260" stroke="#ffffff" stroke-width="2"/>
  <line x1="350" y1="0" x2="350" y2="260" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Highway accent -->
  <line x1="0" y1="90" x2="400" y2="90" stroke="#fdd663" stroke-width="2" opacity="0.6"/>

  <!-- Distance circle (subtle) -->
  <circle cx="200" cy="118" r="62" fill="#2563eb" opacity="0.08"/>
  <circle cx="200" cy="118" r="62" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="2 3" opacity="0.35"/>

  <!-- Other small pins -->
  <circle cx="78" cy="118" r="5" fill="#1a73e8"/>
  <circle cx="78" cy="118" r="2" fill="#fff"/>
  <circle cx="318" cy="60" r="5" fill="#1a73e8"/>
  <circle cx="318" cy="60" r="2" fill="#fff"/>

  <!-- Main pin -->
  <g transform="translate(200, 118)">
    <ellipse cy="32" rx="14" ry="3.5" fill="rgba(0,0,0,0.22)"/>
    <path d="M 0 -36 C -13 -36 -24 -25 -24 -12 C -24 4 -12 16 0 36 C 12 16 24 4 24 -12 C 24 -25 13 -36 0 -36 Z" fill="#ea4335"/>
    <circle cy="-14" r="7.5" fill="#ffffff"/>
  </g>

  <!-- Business card overlay -->
  <g transform="translate(40, 180)" filter="url(#cardShadow)">
    <rect width="320" height="60" rx="12" fill="#ffffff"/>
    <circle cx="32" cy="30" r="16" fill="#0a1f44"/>
    <text x="32" y="36" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">B</text>
    <text x="62" y="24" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#14110d">Your Business</text>
    <text x="62" y="42" font-family="Inter, sans-serif" font-size="10" fill="#fbbc04" letter-spacing="1">★★★★★</text>
    <text x="118" y="42" font-family="Inter, sans-serif" font-size="10" fill="#5f6368">4.9 · Open now · 0.3 km</text>
    <rect x="248" y="18" width="58" height="24" rx="12" fill="#1a73e8"/>
    <text x="277" y="34" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">Directions</text>
  </g>
</svg>
